<div class="gallery-content preview-modal-content">
    <button class="gallery-close" onclick="closeProjectPreview()">✕</button>
    <p id="previewType" class="project-type" style="margin-top: 0.5rem;"></p>
    <h3 id="previewName" class="gallery-title" style="margin-bottom: 0.8rem;">Project Title</h3>
    <div id="previewTags" class="modal-tags"></div>
    <p id="previewDesc" class="modal-desc">Project description goes here...</p>
    <div id="previewFooter"
        style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); margin-top: 1rem; padding-top: 1.5rem;">
        <a id="previewLink" href="#" target="_blank" class="project-link">View Repository &#x2192;</a>
        <button class="btn-outline" style="padding: 0.5rem 1rem; font-size: 0.75rem;"
            onclick="closeProjectPreview()">Close</button>
    </div>
</div>
